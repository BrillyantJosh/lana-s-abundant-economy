services:
  web:
    build: .
    container_name: lana-abundant-economy-web
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=lanapays.us,www.lanapays.us
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=lanapays.us,www.lanapays.us
    volumes:
      - ./data:/app/data
    networks:
      - webproxy

networks:
  webproxy:
    external: true
